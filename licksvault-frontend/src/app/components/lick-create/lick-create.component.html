<div class="p-4">
    <div class="p-fluid grid align-items-center row-gap-2">
      <div class="col-12 md:col-2">
        <label for="name" class="font-bold text-sm">Name</label>
      </div>
      <div class="col-12 md:col-10">
        <input id="name" type="text" pInputText [(ngModel)]="lick.name" placeholder="Enter lick name" />
      </div>

      <div class="col-12 md:col-2">
        <label for="genre" class="font-bold text-sm">Genre</label>
      </div>
      <div class="col-12 md:col-10">
        <div class="flex flex-wrap gap-2">
          @for (opt of genreOptions; track opt.value) {
            <p-button [label]="opt.label"
                      [severity]="lick.genre === opt.value ? 'primary' : 'secondary'"
                      [outlined]="lick.genre !== opt.value"
                      size="small"
                      (onClick)="lick.genre = opt.value"></p-button>
          }
        </div>
      </div>

      <div class="col-12 md:col-2">
        <label for="bpm" class="font-bold text-sm">BPM: {{lick.bpm}}</label>
      </div>
      <div class="col-12 md:col-10">
        <div class="px-2">
          <p-slider id="bpm" [(ngModel)]="lick.bpm" [min]="20" [max]="300" [step]="5"></p-slider>
        </div>
      </div>

      <div class="col-12 md:col-2">
        <label for="lengthBars" class="font-bold text-sm">Length: {{lick.lengthBars}} bars</label>
      </div>
      <div class="col-12 md:col-10">
        <div class="px-2">
          <p-slider id="lengthBars" [(ngModel)]="lick.lengthBars" [min]="1" [max]="12"></p-slider>
        </div>
      </div>

      <div class="col-12 md:col-2">
        <label for="rootNote" class="font-bold text-sm">Tonic</label>
      </div>
      <div class="col-12 md:col-10">
        <app-circle-of-fifths [selectedKey]="lick.rootNote" (keyChange)="lick.rootNote = $event || lick.rootNote"></app-circle-of-fifths>
      </div>

      <div class="col-12 md:col-2">
        <label for="mode" class="font-bold text-sm">Mode</label>
      </div>
      <div class="col-12 md:col-10">
        <div class="flex flex-wrap gap-2">
          @for (opt of modeOptions; track opt.value) {
            <p-button [label]="opt.label"
                      [severity]="lick.mode === opt.value ? 'primary' : 'secondary'"
                      [outlined]="lick.mode !== opt.value"
                      size="small"
                      (onClick)="lick.mode = opt.value"></p-button>
          }
        </div>
      </div>

      <div class="col-12 md:col-2">
        <label for="description" class="font-bold text-sm">Description</label>
      </div>
      <div class="col-12 md:col-10">
        <textarea id="description" pInputTextarea [(ngModel)]="lick.description" rows="2" placeholder="Enter description" class="w-full"></textarea>
      </div>
    </div>

    <div class="flex justify-content-end gap-2 mt-4">
      <p-button label="Cancel" icon="pi pi-times" (onClick)="cancel()" severity="secondary"></p-button>
      <p-button label="Save Lick" icon="pi pi-check" (onClick)="saveLick()" [disabled]="!lick.name"></p-button>
    </div>
</div>

<p-toast></p-toast>
