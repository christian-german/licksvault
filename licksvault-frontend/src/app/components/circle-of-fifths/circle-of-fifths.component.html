<div class="key-selector-container">
  <p-button
    [label]="selectedKeyLabel()"
    icon="pi pi-music"
    (onClick)="op.toggle($event)"
    [outlined]="!selectedKey()"
    severity="secondary"
    size="small"
    class="key-trigger"
  />

  <p-popover #op>
    <div class="circle-popover-content">
      <svg viewBox="0 0 240 240" class="circle-svg">
        <defs>
          <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" style="stop-color:white; stop-opacity:1" />
        <stop offset="100%" style="stop-color:#f8f9fa; stop-opacity:1" />
          </radialGradient>
        </defs>

      <circle cx="120" cy="120" r="118" fill="url(#circleGradient)" stroke="#dee2e6" stroke-width="1" />

        <!-- Major ring (Outer) -->
        @for (item of circleKeys; track item.majorEnum) {
          <g class="segment-group" (click)="selectKey(item.majorEnum, op)">
            <path
              [attr.d]="getSlicePath(60, 110, item.angle - 15, item.angle + 15)"
              class="slice major-slice"
              [class.selected]="selectedKey() === item.majorEnum"
            />
            <text
              [attr.x]="getLabelPosition(85, item.angle).x"
              [attr.y]="getLabelPosition(85, item.angle).y"
              class="slice-label major-label"
              dominant-baseline="middle"
              text-anchor="middle"
            >
              {{item.major}}
            </text>
          </g>
        }

      <g class="center-button" (click)="clearSelection(op)">
        <circle cx="120" cy="120" r="55" class="center-circle" />
        @if (selectedKey()) {
          <text x="120" y="120" class="clear-icon" dominant-baseline="middle" text-anchor="middle">
            ✕
          </text>
        } @else {
          <text x="120" y="120" class="center-label placeholder" dominant-baseline="middle" text-anchor="middle">
            {{selectedKeyLabel()}}
          </text>
        }
      </g>
      </svg>
    </div>
  </p-popover>
</div>
