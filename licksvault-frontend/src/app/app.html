<div class="layout-wrapper">
  <div class="layout-topbar p-2 flex justify-content-between align-items-center shadow-2 mb-2 bg-primary text-primary-contrast">
    <div class="flex align-items-center gap-2 cursor-pointer" routerLink="/">
      <i class="pi pi-music text-2xl"></i>
      <span class="text-xl font-bold">Guitar Lick Library</span>
    </div>
    <div class="flex align-items-center gap-2" *ngIf="isAuthenticated()">
      <p-button icon="pi pi-sign-out" [rounded]="true" text="true" (onClick)="logout()" severity="secondary" pTooltip="Logout"></p-button>
    </div>
  </div>

  <div class="layout-content p-2">
    <router-outlet></router-outlet>
  </div>

  <p-button icon="pi pi-plus" [rounded]="true" pTooltip="New Lick" (onClick)="openNewLickDialog()" severity="primary" class="fab-button" *ngIf="isAuthenticated()"></p-button>
</div>
