services:
  db:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_DB: licksvault
      POSTGRES_USER: licksvault
      POSTGRES_PASSWORD: licksvault
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:RELEASE.2024-03-07T00-43-48Z
    container_name: licksvault-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

volumes:
  pgdata:
  miniodata:
