version: 1
metadata:
  name: licksvault-setup
entries:
  - model: authentik_core.user
    state: present
    identifiers:
      username: user
    attrs:
      username: user
      name: Licksvault User
      email: user@licksvault.local
      is_active: true
      password: pass

  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: licksvault-provider
    attrs:
      name: licksvault-provider
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: licksvault-client
      client_type: public
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:4200/callback
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]

  - model: authentik_core.application
    state: present
    identifiers:
      slug: licksvault
    attrs:
      name: licksvault
      slug: licksvault
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, licksvault-provider]]
