spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/licksvault}
    username: ${DATABASE_USERNAME:licksvault}
    password: ${DATABASE_PASSWORD:licksvault}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8000/application/o/licksvault/}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  bucketName: ${MINIO_BUCKET_NAME:licks-videos}

frontend:
  url: ${FRONTEND_URL:http://localhost:4200}
