name: Build & Push Docker Images

on:
  push:
    tags: ["*"]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  REPO: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./licksvault-frontend
            image: licksvault-frontend
          - context: ./licksvault-backend
            image: licksvault-backend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/${{ matrix.image }}:${{ github.ref_name }}

  build-companion:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: licksvault-companion-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: licksvault-companion-windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: licksvault-companion-macos

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: ./licksvault-companion

      - name: Rename binary
        shell: bash
        run: |
          src="./licksvault-companion/target/${{ matrix.target }}/release/licksvault-companion"
          [[ "${{ matrix.os }}" == "windows-latest" ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release-companion:
    needs: build-companion
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*