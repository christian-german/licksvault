services:

  licksvault-frontend:
    image: ghcr.io/christian-german/licksvault/licksvault-frontend:latest
    container_name: licksvault-frontend
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.licksvault-frontend.rule=Host(`licksvault.atlascore.dev`)
      - traefik.http.routers.licksvault-frontend.entrypoints=websecure
      - traefik.http.routers.licksvault-frontend.tls=true
      - traefik.http.routers.licksvault-frontend.middlewares=authentik-auth@docker
      - traefik.http.services.licksvault-frontend-svc.loadbalancer.server.port=80
    environment:
      API_URL: https://api-licksvault.atlascore.dev
    networks:
      - traefik_network

  licksvault-backend:
    image: ghcr.io/christian-german/licksvault/licksvault-backend:latest
    container_name: licksvault-backend
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.licksvault-backend.rule=Host(`api-licksvault.atlascore.dev`)
      - traefik.http.routers.licksvault-backend.entrypoints=websecure
      - traefik.http.routers.licksvault-backend.tls=true
      - traefik.http.routers.licksvault-backend.middlewares=authentik-auth@docker
      - traefik.http.services.licksvault-backend-svc.loadbalancer.server.port=8080
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://licksvault-db:5432/licksvault
      MINIO_ENDPOINT: http://licksvault-minio:9000
    networks:
      - traefik_network
      - licksvault_internal_network

  licksvault-db:
    image: postgres:18.1-alpine
    container_name: licksvault-db
    environment:
      POSTGRES_DB: licksvault
      POSTGRES_USER: licksvault
      POSTGRES_PASSWORD: licksvault
    volumes:
      - /opt/docker/licksvault/pg-data:/var/lib/postgresql/data
    networks:
      - licksvault_internal_network

  licksvault-minio:
    image: minio/minio:RELEASE.2024-03-07T00-43-48Z
    container_name: licksvault-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - /opt/docker/licksvault/minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - licksvault_internal_network

networks:
  traefik_network:
    external: true
  licksvault_internal_network:
    internal: true
