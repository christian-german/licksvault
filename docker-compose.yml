services:
  db:
    image: postgres:18.1-alpine
    container_name: licksvault-db
    environment:
      POSTGRES_DB: licksvault
      POSTGRES_USER: licksvault
      POSTGRES_PASSWORD: licksvault
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: licksvault-backend
    container_name: licksvault-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/licksvault
      SPRING_DATASOURCE_USERNAME: licksvault
      SPRING_DATASOURCE_PASSWORD: licksvault
      SPRING_FLYWAY_URL: jdbc:postgresql://db:5432/licksvault
      SPRING_FLYWAY_USER: chris
      SPRING_FLYWAY_PASSWORD: password
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: licksvault-frontend
    container_name: licksvault-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

  minio:
    image: minio/minio:RELEASE.2024-03-07T00-43-48Z
    container_name: licksvault-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

volumes:
  pgdata:
  miniodata:
